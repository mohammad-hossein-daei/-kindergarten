{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>کندو | ثبت‌نام</title>
  <style>
    :root {
      --honey-dark: #5D3A1A;
      --honey-medium: #8B5E3C;
      --honey-gold: #F5A623;
      --honey-light: #FDEBD0;
      --honey-drip: #FFB74D;
      --honey-cream: #ffefd0;
      --honey-warm: #FFF3E0;
      --text-dark: #3E2723;
      --text-soft: #5D4037;
      --white: #fff5e7;
      --shadow: rgba(93, 58, 26, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--honey-cream);
      padding: 1rem;
    }
    .card {
      max-width: 500px;
      width: 100%;
      background: var(--white);
      padding: 1.5rem 2rem;
      padding-top: 0px;
      border-radius: 40px;
      box-shadow: 0 20px 40px var(--shadow);
      border: 1px solid var(--honey-light);
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--honey-medium);
      text-align: center;
    }
    .sub {
      text-align: center;
      color: var(--text-soft);
      font-weight: 300;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px dashed var(--honey-light);
      padding-bottom: 0.8rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-soft);
      font-weight: 500;
      margin-bottom: 0.2rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--honey-light);
      border-radius: 60px;
      background: var(--honey-cream);
      font-size: 0.95rem;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--honey-gold);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
    }
    .btn-primary {
      width: 100%;
      background: var(--honey-gold);
      border: none;
      padding: 0.8rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: #5f4033;
      cursor: pointer;
      border: 1px solid #f1d9d1;
      box-shadow: 0 4px 8px #edd9d1;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #e08b3c;
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .hidden {
      display: none !important;
    }
    .logo-center {
      text-align: center;
      margin: 0;
      padding: 0;
    }
    .logo-center img {
      height: 150px;
      display: block;
      margin: 0 auto;
      margin: 0 auto 2px auto;
    }
    .message {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      min-height: 1.5rem;
      text-align: center;
    }
    .message.error {
      color: #d9534f;
    }
    .message.success {
      color: #5cb85c;
    }

    /* OTP Modal */
    .otp-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 1rem;
    }
    .otp-modal {
      max-width: 400px;
      width: 100%;
      background: var(--white);
      padding: 2rem;
      border-radius: 48px;
      text-align: center;
      border: 2px solid var(--honey-light);
      box-shadow: 0 20px 40px var(--shadow);
    }
    .otp-modal h2 {
      font-weight: 300;
      color: var(--honey-medium);
      margin-bottom: 1.5rem;
    }
    .otp-input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid var(--honey-light);
      border-radius: 60px;
      font-size: 1.2rem;
      letter-spacing: 8px;
      text-align: center;
      outline: none;
      direction: ltr;
      background: var(--honey-cream);
    }
    .otp-input:focus {
      border-color: var(--honey-gold);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
    }
    .timer-box {
      margin: 1rem 0;
      font-size: 1rem;
      color: var(--text-soft);
    }
    .timer-box span {
      background: var(--honey-light);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      color: var(--honey-dark);
    }
    .resend-btn {
      background: transparent;
      border: 1px solid var(--honey-light);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      color: var(--text-soft);
      cursor: pointer;
      background: var(--honey-cream);
    }
    .resend-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .otp-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .btn-verify {
      background: var(--honey-gold);
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      color: #5f4033;
      box-shadow: 0 4px 8px #edd9d1;
      border: 1px solid #f1d9d1;
    }
    .btn-verify:hover {
      background: #dfc2b7;
    }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--honey-light);
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      color: var(--text-soft);
      cursor: pointer;
    }
    .btn-cancel:hover {
      background: var(--honey-cream);
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--honey-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .register-link a {
      color: var(--honey-gold);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 2px solid var(--honey-light);
      padding-bottom: 2px;
    }
    .register-link a:hover {
      color: var(--honey-dark);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-center">
    <img src="{% static 'images/logo.png' %}" alt="کندو">
  </div>
  <!-- Register Form -->
  <form id="registerForm">
    {% csrf_token %}
    <div class="form-group">
      <label>نام</label>
      <input type="text" id="regFirstName" placeholder="نام کوچک" required>
    </div>
    <div class="form-group">
      <label>نام خانوادگی</label>
      <input type="text" id="regLastName" placeholder="نام خانوادگی" required>
    </div>
    <div class="form-group">
      <label>شماره تماس</label>
      <input type="tel" id="regPhone" placeholder="۰۹۱۲۱۲۳۴۵۶۷" required>
    </div>
    <div class="form-group">
      <label>ایمیل</label>
      <input type="email" id="regEmail" placeholder="example@mail.com" required>
    </div>
    <div class="form-group">
      <label>رمز عبور</label>
      <input type="password" id="regPassword" placeholder="حداقل ۸ کاراکتر" required minlength="8">
    </div>
    <div class="form-group">
      <label>تکرار رمز عبور</label>
      <input type="password" id="regPasswordConfirm" placeholder="تکرار رمز" required minlength="8">
    </div>
    <button type="submit" class="btn-primary" id="registerBtn">ثبت‌نام و دریافت کد</button>
    <div id="registerMessage" class="message"></div>
  </form>
  <div class="register-link" style="text-align:center; margin-top:1rem; color:var(--text-soft); font-size:0.9rem;">
    قبلاً ثبت‌نام کردید؟ 
    <a href="{% url 'main:login' %}">وارد شوید</a>
  </div>
</div>

<!-- OTP Modal -->
<div id="otpOverlay" class="otp-overlay hidden">
  <div class="otp-modal">
    <h2>🔐 کد تأیید</h2>
    <p style="color:var(--text-soft); margin-bottom:1rem;">کد ۶ رقمی به ایمیل شما ارسال شد</p>
    <form id="otpForm">
      {% csrf_token %}
      <input type="hidden" id="otpEmail" name="email" value="">
      <input type="text" id="otpInput" class="otp-input" maxlength="6" placeholder="• • • • • •" inputmode="numeric">
      <div class="timer-box">
        <span id="timerDisplay">۲:۰۰</span>
      </div>
      <button type="button" id="resendOtpBtn" class="resend-btn" disabled>ارسال مجدد کد</button>
      <div id="otpMessage" class="message"></div>
      <div class="otp-actions">
        <button type="button" id="verifyOtpBtn" class="btn-verify">تأیید</button>
        <button type="button" id="cancelOtpBtn" class="btn-cancel">لغو</button>
      </div>
    </form>
  </div>
</div>


<script>
  (function() {
    // ======== DOM refs ========
    const registerForm = document.getElementById('registerForm');
    const regMsg = document.getElementById('registerMessage');
    const registerBtn = document.getElementById('registerBtn');

    const otpOverlay = document.getElementById('otpOverlay');
    const otpInput = document.getElementById('otpInput');
    const otpEmail = document.getElementById('otpEmail');
    const timerDisplay = document.getElementById('timerDisplay');
    const resendBtn = document.getElementById('resendOtpBtn');
    const verifyBtn = document.getElementById('verifyOtpBtn');
    const cancelBtn = document.getElementById('cancelOtpBtn');
    const otpMsg = document.getElementById('otpMessage');

    const regFirstName = document.getElementById('regFirstName');
    const regLastName = document.getElementById('regLastName');
    const regPhone = document.getElementById('regPhone');
    const regEmail = document.getElementById('regEmail');
    const regPassword = document.getElementById('regPassword');
    const regPasswordConfirm = document.getElementById('regPasswordConfirm');

    // ======== State ========
    let timerInterval = null;
    let timeLeft = 120;
    let isSubmitting = false;
    let currentEmail = '';

    // ======== Helper functions ========
    function showMessage(element, text, type = '') {
      element.textContent = text;
      element.className = 'message ' + type;
    }

    function setLoading(button, loading) {
      if (loading) {
        button.disabled = true;
        button.innerHTML = '<span class="loading-spinner"></span> در حال ارسال...';
      } else {
        button.disabled = false;
        button.textContent = 'ثبت‌نام و دریافت کد';
      }
    }

    function getCsrfToken() {
      const token = document.querySelector('[name=csrfmiddlewaretoken]');
      return token ? token.value : '';
    }

    function startTimer(seconds) {
      clearInterval(timerInterval);
      timeLeft = seconds;
      updateTimerDisplay();
      resendBtn.disabled = true;

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          resendBtn.disabled = false;
          timerDisplay.textContent = '۰:۰۰';
          showMessage(otpMsg, '⏳ زمان تأیید به پایان رسید.', 'error');
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      timerDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function resetOtpModal() {
      clearInterval(timerInterval);
      otpInput.value = '';
      showMessage(otpMsg, '', '');
      otpOverlay.classList.add('hidden');
      timerDisplay.textContent = '۲:۰۰';
      resendBtn.disabled = true;
    }

    function showOtpModal(email) {
      currentEmail = email;
      otpEmail.value = email;
      otpInput.value = '';
      showMessage(otpMsg, '📨 کد تأیید به ایمیل شما ارسال شد.', '');
      otpOverlay.classList.remove('hidden');
      otpInput.focus();
      startTimer(120);
    }

    // ======== Register submit ========
    registerForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      if (isSubmitting) return;

      // Validate
      const firstName = regFirstName.value.trim();
      const lastName = regLastName.value.trim();
      const phone = regPhone.value.trim();
      const email = regEmail.value.trim();
      const password = regPassword.value;
      const passwordConfirm = regPasswordConfirm.value;

      if (!firstName || !lastName || !phone || !email || !password || !passwordConfirm) {
        showMessage(regMsg, '⚠️ همه فیلدها را پر کنید.', 'error');
        return;
      }
      if (password.length < 8) {
        showMessage(regMsg, '⚠️ رمز عبور باید حداقل ۸ کاراکتر باشد.', 'error');
        return;
      }
      if (password !== passwordConfirm) {
        showMessage(regMsg, '⚠️ رمز عبور و تکرار آن مطابقت ندارند.', 'error');
        return;
      }
      if (!email.includes('@') || !email.includes('.')) {
        showMessage(regMsg, '⚠️ ایمیل معتبر وارد کنید.', 'error');
        return;
      }

      isSubmitting = true;
      setLoading(registerBtn, true);
      showMessage(regMsg, '⏳ در حال ثبت‌نام...', '');

      try {
        const response = await fetch('/register/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCsrfToken(),
          },
          body: JSON.stringify({
            first_name: firstName,
            last_name: lastName,
            phone_number: phone,
            email: email,
            password: password,
            password_confirm: passwordConfirm
          })
        });

        const text = await response.text();
        console.log('Register response:', text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          console.error('JSON Parse error:', e);
          showMessage(regMsg, '⚠️ پاسخ سرور معتبر نیست.', 'error');
          return;
        }

        if (data.status === 'success') {
          showMessage(regMsg, '✅ کد تأیید به ایمیل شما ارسال شد.', 'success');
          showOtpModal(email);
        } else {
          showMessage(regMsg, data.error || '⚠️ خطا در ثبت‌نام.', 'error');
        }

      } catch (error) {
        console.error('Fetch error:', error);
        showMessage(regMsg, '⚠️ خطا در ارتباط با سرور: ' + error.message, 'error');
      } finally {
        isSubmitting = false;
        setLoading(registerBtn, false);
      }
    });

    // ======== Verify OTP ========
    verifyBtn.addEventListener('click', async function() {
      const entered = otpInput.value.trim();
      if (entered.length !== 6 || !/^\d{6}$/.test(entered)) {
        showMessage(otpMsg, '⚠️ کد ۶ رقمی را وارد کنید.', 'error');
        return;
      }
      if (timeLeft <= 0) {
        showMessage(otpMsg, '⛔ زمان تأیید تمام شده.', 'error');
        return;
      }

      verifyBtn.disabled = true;
      showMessage(otpMsg, '⏳ در حال تأیید...', '');

      try {
        const response = await fetch('/verify-otp/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCsrfToken(),
          },
          body: JSON.stringify({
            email: currentEmail,
            otp_code: entered
          })
        });

        const text = await response.text();
        console.log('Verify response:', text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          console.error('JSON Parse error:', e);
          showMessage(otpMsg, '⚠️ پاسخ سرور معتبر نیست.', 'error');
          return;
        }

        if (data.status === 'success') {
          showMessage(otpMsg, '✅ ثبت‌نام با موفقیت کامل شد!', 'success');
          setTimeout(() => {
            resetOtpModal();
            window.location.href = data.redirect_url || '/parentdashboard/';
          }, 1500);
        } else {
          showMessage(otpMsg, data.error || '❌ کد اشتباه است.', 'error');
          otpInput.value = '';
          otpInput.focus();
        }
      } catch (error) {
        console.error('Verify error:', error);
        showMessage(otpMsg, '⚠️ خطا در تأیید کد: ' + error.message, 'error');
      } finally {
        verifyBtn.disabled = false;
      }
    });

    // ======== Resend OTP ========
    resendBtn.addEventListener('click', async function() {
      if (timeLeft > 0) {
        showMessage(otpMsg, '⏳ لطفاً صبر کنید.', 'error');
        return;
      }

      resendBtn.disabled = true;
      showMessage(otpMsg, '⏳ در حال ارسال مجدد...', '');

      try {
        const response = await fetch('/resend-otp/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCsrfToken(),
          },
          body: JSON.stringify({ email: currentEmail })
        });

        const text = await response.text();
        console.log('Resend response:', text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          console.error('JSON Parse error:', e);
          showMessage(otpMsg, '⚠️ پاسخ سرور معتبر نیست.', 'error');
          return;
        }

        if (data.status === 'success') {
          showMessage(otpMsg, '📨 کد جدید ارسال شد.', 'success');
          otpInput.value = '';
          startTimer(120);
        } else {
          showMessage(otpMsg, data.message || '⚠️ خطا در ارسال مجدد.', 'error');
          resendBtn.disabled = false;
        }
      } catch (error) {
        showMessage(otpMsg, '⚠️ خطا در ارتباط با سرور: ' + error.message, 'error');
        resendBtn.disabled = false;
        console.error('Resend error:', error);
      }
    });

    // ======== Cancel ========
    cancelBtn.addEventListener('click', function() {
      resetOtpModal();
    });

    // ======== OTP input validation ========
    otpInput.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(0, 6);
    });

    otpInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        verifyBtn.click();
      }
    });

    // ======== Initial ========
    showMessage(regMsg, '', '');
  })();
</script>

</body>
</html>
