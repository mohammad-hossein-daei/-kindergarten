{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد معلم - {{ page_title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --honey-dark: #5D3A1A;
            --honey-medium: #8B5E3C;
            --honey-gold: #F5A623;
            --honey-light: #FDEBD0;
            --honey-cream: #ffefd0;
            --white: #fff5e7;
            --shadow: rgba(93, 58, 26, 0.2);
            --text-soft: #5D4037;
            --sidebar-width: 250px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: var(--honey-cream);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
        }
        
        /* سایدبار */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            padding: 2rem 1rem;
            box-shadow: -4px 0 20px var(--shadow);
            overflow-y: auto;
            border-radius: 0 20px 20px 0;
        }
        .sidebar .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .sidebar .logo img {
            height: 80px;
        }
        .sidebar .logo h2 {
            color: var(--honey-medium);
            font-size: 1.2rem;
        }
        .sidebar .menu {
            list-style: none;
        }
        .sidebar .menu li {
            margin-bottom: 0.5rem;
        }
        .sidebar .menu li a {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            color: var(--text-soft);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            gap: 10px;
        }
        .sidebar .menu li a i {
            width: 20px;
            text-align: center;
        }
        .sidebar .menu li a:hover {
            background: var(--honey-cream);
        }
        .sidebar .menu li a.active {
            background: var(--honey-gold);
            color: white;
        }
        .sidebar .menu li a.logout {
            color: #d9534f;
            margin-top: 2rem;
        }
        .sidebar .menu li a.logout:hover {
            background: #d9534f;
            color: white;
        }
        
        /* محتوای اصلی */
        .main-content {
            margin-right: var(--sidebar-width);
            flex: 1;
            padding: 2rem;
        }
        .main-content .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            padding: 1rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px var(--shadow);
            margin-bottom: 2rem;
        }
        .main-content .header h1 {
            color: var(--honey-medium);
            font-size: 1.5rem;
        }
        .main-content .header h1 i {
            margin-left: 10px;
        }
        .main-content .header .user-info {
            color: var(--text-soft);
        }
        
        /* محتوای صفحات */
        .page-content {
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px var(--shadow);
            min-height: 500px;
        }
        
        /* استایل کارت‌ها */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .card-link {
            text-decoration: none;
            display: block;
            transition: transform 0.2s ease;
        }
        .card-link:hover {
            transform: translateY(-5px);
        }
        .card {
            background: var(--honey-cream);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--honey-light);
            transition: all 0.2s ease;
            height: 100%;
            cursor: pointer;
        }
        .card-link:hover .card {
            background: var(--honey-light);
            border-color: var(--honey-gold);
            box-shadow: 0 10px 20px rgba(93, 58, 26, 0.15);
        }
        .card h3 {
            color: var(--honey-medium);
            margin-bottom: 0.5rem;
        }
        .card p {
            color: var(--text-soft);
        }
    </style>
</head>
<body>
    <!-- سایدبار -->
    <div class="sidebar">
        <div class="logo">
            <img src="{% static 'images/logo.png' %}" alt="کندو">
            <h2>پنل معلم</h2>
        </div>
        <ul class="menu">
            {% for key, value in pages.items %}
                <li>
                    <a href="{% url 'main:teacher_page' key %}" class="{% if current_page == key %}active{% endif %}">
                        <i class="fas {{ value.icon }}"></i>
                        {{ value.title }}
                    </a>
                </li>
            {% endfor %}
            <li>
                <a href="{% url 'main:logout' %}" class="logout">
                    <i class="fas fa-sign-out-alt"></i>
                    خروج
                </a>
            </li>
        </ul>
    </div>

    <!-- محتوای اصلی -->
    <div class="main-content">
        <div class="header">
            <h1>
                <i class="fas {{ page_icon }}"></i>
                {{ page_title }}
            </h1>
            <div class="user-info">
                <i class="fas fa-user"></i>
                {{ user.get_full_name|default:user.email }}
            </div>
        </div>
        
        <div class="page-content">
            {% include page_template %}
        </div>
    </div>
</body>
</html>
