{% extends 'parentdashboard/dashboard.html' %}
{% load static %}

{% block page_content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-danger text-white text-center py-4">
                    <i class="fas fa-times-circle fa-4x mb-2"></i>
                    <h3 class="mb-0">❌ پرداخت ناموفق بود</h3>
                </div>
                <div class="card-body p-4 text-center">
                    <p class="lead">متأسفانه پرداخت شما با مشکل مواجه شد.</p>
                    <p>لطفاً مجدداً تلاش کنید یا با پشتیبانی تماس بگیرید.</p>
                    <hr>
                    <div class="d-grid gap-2">
                        <a href="{% url 'main:dashboard_page' 'register_child' %}" class="btn btn-primary">
                            <i class="fas fa-redo me-2"></i>
                            تلاش مجدد
                        </a>
                        <a href="{% url 'main:parentdashboard' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-home me-2"></i>
                            بازگشت به داشبورد
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
